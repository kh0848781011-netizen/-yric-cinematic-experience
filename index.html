<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cinematic Experience</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>

  <!-- ===== APP WRAPPER — rotated as a whole on mobile landscape ===== -->
  <div id="app-wrapper">

    <!-- ===== INTRO LOADING OVERLAY ===== -->
    <div id="intro-overlay" aria-hidden="true">
      <div class="intro-content">
        <div class="intro-ring"></div>
        <p class="intro-text">Loading cinematic experience...</p>
      </div>
    </div>

    <!-- ===== BACKGROUND SLIDES ===== -->
    <div id="bg-container" aria-hidden="true">
      <div class="bg-slide active"></div>
      <div class="bg-slide"></div>
      <div class="bg-slide"></div>
      <div class="bg-slide"></div>
    </div>

    <!-- ===== CUSTOM CURSOR ===== -->
    <div id="custom-cursor" aria-hidden="true"></div>

    <!-- ===== MAIN CONTENT ===== -->
    <div id="main-content">
      <header>
        <p class="subtitle">✶ Cinematic Experience</p>
        <h1>Khám Phá Vẻ Đẹp<br /><span class="highlight">Honkai: Star Rail</span></h1>
        <p class="description">mổi ngày là 1 ngày vui</p>
      </header>

      <!-- ===== TOAST NOTIFICATION ===== -->
      <div id="toast" class="toast" aria-live="polite"></div>

      <!-- ===== LYRICS OVERLAY ===== -->
      <div id="lyrics-overlay" class="lyrics-overlay" aria-hidden="true">
        <p class="lyrics-line" id="lyrics-line"></p>
      </div>

      <!-- ===== AUDIO CONTROLS — Glassmorphism ===== -->
      <div class="audio-panel" id="audio-panel">
        <!-- Progress bar row -->
        <div class="seek-row">
          <span class="time-display" id="current-time">0:00</span>
          <div class="seek-bar" id="seek-bar" role="slider" aria-label="Audio seek" tabindex="0">
            <div class="seek-progress" id="seek-progress">
              <div class="seek-thumb" id="seek-thumb"></div>
            </div>
          </div>
          <span class="time-display" id="total-time">0:00</span>
        </div>

        <!-- Controls row -->
        <div class="controls-row">
          <div class="audio-info">
            <span class="audio-track-label" id="track-label" style="cursor: pointer;" title="Click to open playlist">Track
              1</span>
            <span class="viz-dots" id="viz-dots">
              <span></span><span></span><span></span>
            </span>
          </div>
          <div class="audio-actions">
            <div class="volume-wrap">
              <button id="mute-btn" class="audio-btn" aria-label="Mute/Unmute">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                  <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                  <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                </svg>
              </button>
              <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="0.8"
                aria-label="Volume">
            </div>
            <button id="play-btn" class="audio-btn" aria-label="Play/Pause">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="6,3 20,12 6,21" />
              </svg>
            </button>

          </div>
        </div>
      </div>

      <p class="credit" id="image-credit"></p>
    </div>

    <!-- ===== INDEPENDENT AUDIO VISUALIZER — sits at bottom of screen, separate from audio panel ===== -->
    <div id="viz-bar" class="viz-bar" aria-hidden="true">
      <canvas id="visualizer-canvas" class="visualizer-canvas" aria-hidden="true"></canvas>
      <div class="viz-bar-glow"></div>
    </div>

    <!-- ===== ROTATE DEVICE PROMPT (mobile portrait) ===== -->
    <div id="rotate-device" class="rotate-device" aria-hidden="true">
      <div class="rotate-device-content">
        <div class="rotate-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            <path d="M3 3v5h5" />
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
            <path d="M21 21v-5h-5" />
          </svg>
        </div>
        <p class="rotate-title">Xoay ngang điện thoại</p>
        <p class="rotate-sub">Trải nghiệm điện ảnh đỉnh cao<br/>ở chế độ ngang</p>
      </div>
    </div>

    <!-- ===== PLAYLIST OVERLAY — iOS Blur Glassmorphism ===== -->
    <div id="playlist-overlay" class="playlist-overlay" aria-hidden="true">
      <div class="playlist-backdrop" id="playlist-backdrop"></div>
      <div class="playlist-panel" id="playlist-panel">
        <div class="playlist-header">
          <span class="playlist-title">🎵 Now Playing</span>
          <button class="playlist-close-btn" id="playlist-close-btn" aria-label="Close playlist">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="playlist-scroll">
          <ul class="playlist-tracks" id="playlist-tracks"></ul>
        </div>
      </div>
    </div>

  </div><!-- /#app-wrapper -->

  <!-- ===== FILE UPLOAD BUTTONS — Thêm Ảnh / Thêm Nhạc (hidden input + styled label) ===== -->
  <div id="file-upload-toolbar" class="file-upload-toolbar" aria-label="Thêm media từ máy tính">
    <label for="image-upload-input" class="file-upload-btn" title="Thêm Ảnh từ máy tính" aria-label="Thêm Ảnh">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <polyline points="21 15 16 10 5 21" />
      </svg>
      <span class="file-upload-label">Thêm Ảnh</span>
    </label>
    <input type="file" id="image-upload-input" class="file-input-hidden" accept="image/*" multiple>

    <label for="music-upload-input" class="file-upload-btn" title="Thêm Nhạc từ máy tính" aria-label="Thêm Nhạc">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13" />
        <circle cx="6" cy="18" r="3" />
        <circle cx="18" cy="16" r="3" />
      </svg>
      <span class="file-upload-label">Thêm Nhạc</span>
    </label>
    <input type="file" id="music-upload-input" class="file-input-hidden" accept="audio/*" multiple>
  </div>

  <!-- ===== IMAGE PLAYLIST — top-right corner, glassmorphism, independent controls ===== -->
  <div id="image-playlist-container" class="image-playlist-container playlist-hidden-init" aria-label="Image playlist">
    <button id="img-pl-grid-btn" class="img-pl-arrow" aria-label="Danh sách ảnh" title="Danh sách ảnh">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /></svg>
    </button>
    <button id="img-pl-prev" class="img-pl-arrow" aria-label="Ảnh trước">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6" /></svg>
    </button>
    <div id="img-pl-dots" class="img-pl-dots"></div>
    <button id="img-pl-next" class="img-pl-arrow" aria-label="Ảnh tiếp">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6" /></svg>
    </button>
  </div>

  <!-- ===== IMAGE FULL PLAYLIST DROPDOWN — appears below image-playlist-container when grid btn clicked ===== -->
  <div id="img-full-playlist" class="img-full-playlist" aria-label="Full image list">
    <div class="img-full-list" id="img-full-list"></div>
  </div>

  <!-- ===== UI TOGGLE BUTTON — standalone, outside wrapper, always accessible ===== -->
  <button id="ui-toggle-btn" class="ui-toggle-standalone" aria-label="Tạm thời ẩn/hiện UI" title="Ẩn/Hiện UI">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
      <circle cx="12" cy="12" r="3" />
    </svg>
    <span class="ui-toggle-label">UI</span>
  </button>

  <!-- ===== FLIP ORIENTATION BUTTON — Glassmorphism, outside wrapper ===== -->
  <button id="flip-orientation-btn" class="flip-btn" aria-label="Đảo chiều màn hình" title="Đảo Chiều Màn Hình">
    <svg class="flip-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
      <path d="M3 3v5h5" />
      <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
      <path d="M21 21v-5h-5" />
    </svg>
    <span class="flip-label">Đảo Chiều</span>
  </button>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
